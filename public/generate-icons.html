<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c"></canvas>
<script>
const sizes = [72,96,128,144,152,192,384,512];
sizes.forEach(s => {
  const c = document.createElement('canvas');
  c.width = s; c.height = s;
  const ctx = c.getContext('2d');
  // Background gradient
  const g = ctx.createLinearGradient(0,0,s,s);
  g.addColorStop(0,'#E96A36');
  g.addColorStop(0.5,'#E94082');
  g.addColorStop(1,'#7E5BEF');
  ctx.fillStyle = g;
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(s-r,0);
  ctx.quadraticCurveTo(s,0,s,r);
  ctx.lineTo(s,s-r);
  ctx.quadraticCurveTo(s,s,s-r,s);
  ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.fill();
  // Camera icon (simplified)
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s*0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📸', s/2, s/2);
  console.log(s + ':' + c.toDataURL('image/png'));
});
</script>
</body>
</html>
